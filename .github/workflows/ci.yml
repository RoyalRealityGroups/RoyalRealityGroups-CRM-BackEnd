name: RRG-BackEnd-Build
 
on:
  push:
    branches:
      - main
  pull_request:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mydb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d mydb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
 
    env:
      DEBUG: "True"
      PYTHONUNBUFFERED: "1"
 
      DJANGO_SECRET_KEY: "092378r026720760326382623682364"
      DJANGO_ALLOWED_HOSTS: "localhost"
 
      URL_SCHEMA: "http"
      GLOBAL_API_URL: "http://localhost"
 
      SAFE_MODE: "False"
      DYNAMICS_SAFE_MODE: "False"
      FLOW_SAFE_MODE: "False"
 
      CORS_ALLOWED_ORIGINS: "http://localhost"
 
      DB_NAME: mydb
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: localhost
      DB_PORT: 5432
 
      USE_REDIS: "True"
      REDIS_URL: redis://localhost:6379/1
 
      USE_S3: "False"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools
 
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -U postgres -d mydb; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Wait for Redis
        run: |
          until redis-cli -h localhost -p 6379 ping; do
            echo "Waiting for Redis..."
            sleep 2
          done
 
      - name: Run migrations
        run: python manage.py migrate --noinput
 
      - name: Run custom management commands
        run: |
          python manage.py UpdateContentTypeDetail
          python manage.py UpdatePermissionDetail
          python manage.py import_menu_data
 
      # Uncomment if your project has tests
      # - name: Run tests
      #   run: python manage.py test
 
      - name: Collect static files
        run: python manage.py collectstatic --noinput
 
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RRG-BackEnd-Build
          path: .
          if-no-files-found: warn 
