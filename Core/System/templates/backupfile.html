{% extends 'admin/base_site.html' %}

{% block content %}
  <form id="upload_backup_file" action="{% url 'admin:upload_backup_file' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <label for="file">Upload Backup File</label>
    <input type="file" name="file" id="file">
    
    <p><input type="submit" value="Upload Backup File" /></p>

  </form>
{% endblock %}
